<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMS Gateway Authentication</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="auth-container" style="margin-top: 10vh;">
        <div class="auth-header">
            <h1>⚖️ CMS Docket Ledger</h1>
            <p>Firm-wide Case File Cryptographic Vault</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert-box alert-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/">
            <div class="form-group">
                <label>System Identity Key (Username)</label>
                <input type="text" name="username" required placeholder="User registration tag">
            </div>
            <div class="form-group">
                <label>Security Cryptopass (Password)</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 10px;">Authorize Identity</button>
        </form>

        <div class="auth-footer">
            <span style="color:#64748b;">New Terminal Allocation?</span> <a href="/register">Register Identity</a>
        </div>
    </div>
</body>
</html>
