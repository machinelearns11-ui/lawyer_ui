<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Gateway Authentication</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="auth-container" style="margin-top: 10vh;">
        <div class="auth-header">
            <h1>⚖️ CMS Docket Ledger</h1>
            <p>Firm-wide Case File Cryptographic Vault</p>
        </div>

        <!-- Displays Flask Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert-box alert-{{ category }}" style="color: {% if category == 'error' %}#ef4444{% else %}#10b981{% endif %}; margin-bottom: 15px; font-weight: 600;">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Direct POST to Flask Root Route -->
        <form method="POST" action="/">
            <div class="form-group">
                <label for="username">System Identity Key (Username)</label>
                <input type="text" id="username" name="username" required placeholder="User registration tag">
            </div>
            <div class="form-group">
                <label for="password">Security Cryptopass (Password)</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 10px;">Authorize Identity</button>
        </form>

        <div class="auth-footer">
            <span style="color:#64748b;">New Terminal Allocation?</span> 
            <a href="{{ url_for('register') }}">Register Identity</a>
        </div>
    </div>
</body>
</html>
