<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMS Gateway Authentication</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="auth-container" style="margin-top: 10vh;">
        <div class="auth-header">
            <h1>⚖️ CMS Docket Ledger</h1>
            <p>Firm-wide Case File Cryptographic Vault</p>
        </div>
         
        <div id="alert-container"></div>


        <form method="POST" action="/">
          <div class="form-group">
            <label>System Identity Key (Username)</label>
              <input type="text" id="username" name="username" required placeholder="User registration tag">
          </div>
          <div class="form-group">
            <label>Security Cryptopass (Password)</label>
           <input type="password" id="password" name="password" required placeholder="••••••••">
         </div>
        <button type="submit" class="btn-primary" style="margin-top: 10px;">Authorize Identity</button>
    </form>

        <div class="auth-footer">
            <span style="color:#64748b;">New Terminal Allocation?</span> 
            <a href="register.html">Register Identity</a>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        
        const usernameVal = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;
        const alertBox = document.getElementById('alert-container');

        alertBox.innerHTML = '';

        try {
            const BACKEND_URL = 'https://lawyer-backend-api.onrender.com/api/login';

            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: usernameVal,
                    password: passwordVal
                })
            });

            const contentType = response.headers.get("content-type");
            if (!contentType || !contentType.includes("application/json")) {
                throw new Error("Server returned non-JSON response. Check backend routes.");
            }

            const data = await response.json();

            if (response.ok && data.success) {
                localStorage.setItem('user', data.username);
                localStorage.setItem('role', data.role);
                // Redirect to backend dashboard or your frontend dashboard page
                window.location.href = 'dashboard.html'; 
            } else {
                alertBox.innerHTML = `<div class="alert-box alert-error" style="color: red; margin-bottom: 15px;">${data.error || 'Invalid credentials.'}</div>`;
            }

        } catch (err) {
            console.error("Connection Error:", err);
            alertBox.innerHTML = `<div class="alert-box alert-error" style="color: red; margin-bottom: 15px;">Gateway Connection Error: ${err.message}</div>`;
        }
    });
</script>
</body>
</html>
