<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CMS Gateway Authentication</title>
    <link rel="stylesheet" href="/style.css"> 
</head>
<body>
    <div class="auth-container" style="margin-top: 10vh;">
        <div class="auth-header">
            <h1>⚖️ CMS Docket Ledger</h1>
            <p>Firm-wide Case File Cryptographic Vault</p>
        </div>
        
        <div id="alert-container"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>System Identity Key (Username)</label>
                <input type="text" id="username" name="username" required placeholder="User registration tag">
            </div>
            <div class="form-group">
                <label>Security Cryptopass (Password)</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 10px;">Authorize Identity</button>
        </form>

        <div class="auth-footer">
            <span style="color:#64748b;">New Terminal Allocation?</span> <a href="/register">Register Identity</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevents the browser from doing a generic form reload
            
            const usernameVal = document.getElementById('username').value;
            const passwordVal = document.getElementById('password').value;
            const alertBox = document.getElementById('alert-container');

            // Clear previous alerts
            alertBox.innerHTML = '';

            try {
                // ⚠️ REPLACE THIS URL with your live Render Web Service Backend API URL once deployed!
                const BACKEND_URL = 'https://lawyer-backend-api.onrender.com/api/login';

                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameVal,
                        password: passwordVal
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store credentials locally to persist the frontend session state
                    localStorage.setItem('user', data.username);
                    localStorage.setItem('role', data.role);
                    
                    // Redirect to your absolute/relative static page dashboard
                    window.location.href = '/dashboard.html'; 
                } else {
                    // Render custom error messaging matching your template styling
                    alertBox.innerHTML = `<div class="alert-box alert-error" style="color: red; margin-bottom: 15px;">${data.error || 'Invalid credentials.'}</div>`;
                }

            } catch (err) {
                console.error("Connection Error:", err);
                alertBox.innerHTML = `<div class="alert-box alert-error" style="color: red; margin-bottom: 15px;">Could not connect to authentication gateway server.</div>`;
            }
        });
    </script>
</body>
</html>
